prompt: |
  BUSINESS FACTS - HAPPY HOUND

  PLAYGROUPS
  - Big Hound Town: Large dogs; mixed play and chill.
  - Middle Hound Town: High-energy, athletic dogs.
  - Little Hound Town: Small dogs and puppies 4 months+.
  - Lounge Around Town: Seniors and low-energy dogs.
  - Puppy Park: Puppies 8 to 16 weeks old.
  - Enhanced Daycare: For dogs not spayed/neutered, behavior/socialization needs, post-surgery recovery, or dogs needing one-on-one care.

  DAYCARE PRICING
  - Drop-in Day Visit: $70/day
  - Frequent Barker Card: $590 for 10 visits ($59/day)
  - Platinum Bone Card: $900 for 20 visits ($45/day)
  - Golden Leash Club Card: $775/month unlimited daycare with 6-month commitment ($25/day effective)
  - Enhanced Care Daycare: $95/day
  - Facility is open 7 days/week for all-day play.

  BOARDING
  - Overnight includes a full daycare day.
  - On pick-up day, up to 2-hour morning grace period; after that, regular daycare day applies.
  - First-time boarders must be assessed and complete at least 2 daycare visits before overnight stays.
  - Classic Sleepover: $125/night (includes daycare)
  - Classic Sleepover Plus: $150/night (includes daycare and enrichment)
  - Enhanced Care Sleepover: $175/night (includes enrichment)
  - Stay Your Way Sleepover: $250 first night, $175 additional nights (no assessment required)
  - Owner provides breakfast/snacks/dinner; Happy Hound serves.

  TRAINING PROGRAMS
  Behavior Boosters:
  - A-La-Bark: $100/hour, appointment required.
  - Daycare Training: $600/5 sessions, $1,100/10 sessions, $1,980/20 sessions.
  - New Start: $899 (4 on-site), $1,050 (2 on-site + 2 at home), $1,200 (4 at home).
  Board and Train:
  - 4 Day Hooray: $599
  - 10 Day Basic Manners: $2,995
  - 21 Day Celebrity Rehab and Socialization: $3,995
  - 28 Day Passive Aggressive Recovery: $4,495

  GROOMING SERVICES
  Bath Menu:
  - Basic Bath: $55 (up to 19 lbs), $70 (20-60 lbs), $90 (over 60 lbs)
  - Basic Bath Plus: $63, $78, $98
  - Deluxe Bath: $75, $90, $110
  - Deluxe Bath Plus: $90, $105, $125
  - Also offered: Shed-less Bath, De-Skunk Treatment
  Grooming Menu:
  - Mini Groom and Full Groom by size:
    Small up to 19 lbs: $90 mini, $114 full
    Medium 20-60 lbs: $126 mini, $150 full
    Large 60-100 lbs: $156 mini, $180 full
    X-Large 100+ lbs: $216 mini, $240 full
